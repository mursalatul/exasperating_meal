<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Board - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --card: #1f1f26;
    --border: #2e2e3a;
    --accent: #f0c040;
    --text: #e8e8f0;
    --muted: #6e6e88;
    --danger: #ff5f5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .login-card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  select, input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #0e0e10;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    margin-top: 10px;
  }

  .btn-login:hover {
    opacity: 0.9;
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  .error-msg {
    background: rgba(255,95,95,0.1);
    border: 1px solid rgba(255,95,95,0.3);
    color: var(--danger);
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="logo-tag">Meal Board</div>
    <h1>Welcome Back</h1>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <div class="form-group">
      <label for="username">Who are you?</label>
      <select name="username" id="username" required>
        <option value="" disabled {% if not selected_username %}selected{% endif %}>Select your name</option>
        {% for user in users %}
        <option value="{{ user.username }}" {% if selected_username == user.username %}selected{% endif %}>{{ user.username }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" placeholder="Enter your 4-digit code" required>
    </div>

    <button type="submit" class="btn-login">Sign In</button>
  </form>
</div>

</body>
</html>
